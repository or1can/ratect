[package]
name = "ratect-core"
version = "0.10.0"
edition = "2021"

[dependencies]
serde = { version = "1.0", features = ["derive"] }
noyalib = { version = "0.0.13", features = ["compat-serde-yaml"] }
bollard = "0.21"
anyhow = "1.0"
futures = "0.3"
indicatif = "0.18"
tracing = "0.1"
async-recursion = "1.1"
async-trait = "0.1"
uuid = { version = "1", features = ["v4"] }
tar = "0.4"
dockerignore = { path = "../dockerignore" }
path-clean = "1"
tokio = { version = "1.52", features = ["full"] }
crossterm = "0.29.0"
nix = { version = "0.31.3", features = ["user"] }
url = "2.5.8"
sha2 = "0.10"
toml = "0.8"
