[package]
name = "ratect-core"
version = "0.3.0-dev"
edition = "2021"

[dependencies]
serde = { version = "1.0", features = ["derive"] }
noyalib = { version = "0.0.13", features = ["compat-serde-yaml"] }
bollard = "0.21"
anyhow = "1.0"
futures = "0.3"
indicatif = "0.18"
tracing = "0.1"
async-recursion = "1.1"
async-trait = "0.1"
uuid = { version = "1", features = ["v4"] }
tar = "0.4"
dockerignore = { path = "../dockerignore" }
tokio = { version = "1.52", features = ["full"] }
