# Exercises `-- ADDITIONAL_ARGS` forwarding: whatever args are passed after
# `--` on the command line are appended as literal argv after `echo-args`'s
# own tokenized `command` — matching Batect's own mechanism exactly, no
# shell involved.
project_name: ratect-additional-args-test
containers:
  build-env:
    image: alpine:3.18.2
tasks:
  echo-args:
    run:
      container: build-env
      command: "echo args:"
