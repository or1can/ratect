# Exercises rejection of unsupported config keys: `not_a_real_field` isn't a
# Batect/Ratect container field at all, so it must fail config loading
# rather than silently being ignored.
project_name: ratect-unsupported-key-test
containers:
  build-env:
    image: alpine:3.18.2
    not_a_real_field: json-file
tasks:
  test-task:
    run:
      container: build-env
      command: echo hi
