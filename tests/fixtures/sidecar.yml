# Exercises dependency (sidecar) container resolution end to end: multiple
# sibling dependencies (database, cache) plus a nested one (metrics, only
# reachable via database) all sharing one task-scoped network with `app`.
# Also exercises a task-level `dependencies` entry (queue): a sidecar scoped
# to one task specifically, distinct from `app`'s own container-level
# `dependencies` above — `queue` isn't in `app`'s own `dependencies`, so
# `ping-sidecars` (which doesn't declare it) can't reach it, but
# `ping-task-level-sidecar` (which does) can. Also exercises `customise`
# (configurable): its `setup_commands` assertion only passes once
# `customise-sidecar` actually overrides its environment/working_directory —
# a failing assertion would fail the setup command, which fails the task,
# proving the customisation reached the real container.
#
# redis is used purely because its default command (`redis-server`) stays
# running with no configuration — Container has no `command` field, so a
# dependency always runs its image's default command.
project_name: ratect-sidecar-test
containers:
  metrics:
    image: redis:7-alpine
  database:
    image: redis:7-alpine
    dependencies:
      - metrics
  cache:
    image: redis:7-alpine
  queue:
    image: redis:7-alpine
  configurable:
    image: redis:7-alpine
    working_directory: /data
    setup_commands:
      - command: sh -c 'test "$MODE" = "customised" && [ "$(pwd)" = "/custom" ]'
  app:
    image: alpine:3.18.2
    dependencies:
      - database
      - cache
tasks:
  ping-sidecars:
    run:
      container: app
      command: sh -c "ping -c 1 database && ping -c 1 cache && ping -c 1 metrics"
  ping-task-level-sidecar:
    run:
      container: app
      command: ping -c 1 queue
    dependencies:
      - queue
  customise-sidecar:
    run:
      container: app
      command: echo customise-sidecar-ok
    dependencies:
      - configurable
    customise:
      configurable:
        environment:
          MODE: customised
        working_directory: /custom
