# Exercises interactive mode end-to-end: run from a real (emulated) local
# terminal — see `interactive_session_forwards_stdin_and_stdout` in
# tests/cli.rs — this task's container should get a real Docker TTY and its
# stdin forwarded, rather than the usual non-interactive `docker logs`
# streaming.
project_name: ratect-interactive-test
containers:
  shell:
    image: alpine:3.18.2
tasks:
  shell:
    run:
      container: shell
      command: sh
  # Exits the moment it starts — see
  # `instantly_exiting_interactive_task_does_not_warn_about_tty_resize` in
  # tests/cli.rs: the attach-time TTY size sync races such a container's own
  # exit, and losing that race must stay silent (it's benign), not warn.
  instant:
    run:
      container: shell
      command: echo instant-exit
