# Exercises `build_secrets` end-to-end against a real BuildKit build (its
# per-build session is what serves the secret): the Dockerfile's `RUN --mount=type=secret,id=token` only sees the
# secret's value inside that one `RUN` layer's mount, not persisted into any
# image layer — the task then cats the file that `RUN` copied it into,
# proving the secret's value (read from *this test process's own*
# RATECT_BUILD_SECRETS_TEST_TOKEN environment variable at build time, not
# baked into the fixture) reached a real `docker build`.
project_name: ratect-build-secrets-test
containers:
  build-env:
    build_directory: ./build-secrets
    build_secrets:
      token:
        environment: RATECT_BUILD_SECRETS_TEST_TOKEN
tasks:
  print-secret:
    run:
      container: build-env
      command: cat /secret-out.txt
