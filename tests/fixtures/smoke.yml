# The original smoke-test config (this repo's root `batect.yml` before going
# public — moved here because a root `batect.yml` reads as *this project's own*
# dev-task config by the very convention ratect implements, and this is a test
# fixture, not that). Exercises the basics several `tests/cli.rs` tests share:
# task listing, a shared prerequisite running exactly once, a volume mount, and
# a happy-path task run.
project_name: ratect-test
containers:
  build-env:
    image: alpine:3.18.2
    volumes:
      - .:/code
tasks:
  shared-prereq:
    run:
      container: build-env
      command: echo "I should only run once"
  prereq-task:
    run:
      container: build-env
      command: echo "I am a prerequisite"
    prerequisites:
      - shared-prereq
  list-volume-task:
    run:
      container: build-env
      command: ls /code
    prerequisites:
      - shared-prereq
  test-task:
    run:
      container: build-env
      command: echo "Hello from ratect!🐀"
    prerequisites:
      - prereq-task
      - list-volume-task
